# nginx.conf — Minimal config for serving a static site
#
# Nginx is a web server. Its only job here is to listen for HTTP requests
# and respond with your static files (index.html, style.css).
# Think of it as a waiter: someone asks for a page, Nginx hands it to them.

# Run as a single worker process (plenty for a static blog)
worker_processes 1;

events {
    # Max simultaneous connections per worker
    worker_connections 512;
}

http {
    # This file maps file extensions to MIME types so the browser
    # knows that .css is a stylesheet, .html is a page, etc.
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Performance: send files directly from disk to network socket
    sendfile on;

    # Close idle connections after 30 seconds (saves resources)
    keepalive_timeout 30;

    server {
        # Listen on port 80 inside the container.
        # Azure Container Apps will route external traffic to this port.
        listen 80;
        server_name _;

        # Where the static files live inside the container
        root /usr/share/nginx/html;
        index index.html;

        # Serve files, or return 404 if not found
        location / {
            try_files $uri $uri/ =404;
        }

        # Cache static assets (CSS, fonts, images) for 7 days.
        # Browsers will reuse cached files instead of re-downloading them.
        location /static/ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }

        # Custom 404 page (optional, falls back to Nginx default)
        error_page 404 /404.html;
    }
}
