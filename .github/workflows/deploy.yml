# ============================================================================
# deploy.yml — Automatically build and deploy the blog when you push to main
#
# What this does:
# 1. Checks out your code
# 2. Logs into your Azure Container Registry
# 3. Builds the Docker image (which runs build.py inside)
# 4. Pushes the image to ACR
# 5. Deploys the new image to Azure Container Apps
#
# Triggered by: any push to the main branch
# ============================================================================

name: Build and Deploy Blog

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Log into Azure Container Registry
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Step 3: Build the Docker image
      # Tags with both 'latest' and the short commit SHA for traceability
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/blog:latest \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/blog:${{ github.sha }} \
                       .

      # Step 4: Push the image to ACR
      - name: Push to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/blog:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/blog:${{ github.sha }}

      # Step 5: Deploy to Azure Container Apps
      - name: Deploy to Container Apps
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name blog-alsurdelafrontera \
              --resource-group rg-alsurdelafrontera \
              --image ${{ secrets.ACR_LOGIN_SERVER }}/blog:${{ github.sha }}
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
